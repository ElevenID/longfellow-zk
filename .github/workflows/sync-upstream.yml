name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Add upstream remote
        run: |
          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream https://github.com/google/longfellow-zk.git
          fi
      
      - name: Fetch upstream
        run: git fetch upstream
      
      - name: Check for changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
      
      - name: Prepare sync branch
        if: steps.check.outputs.behind > 0
        run: |
          BRANCH="automation/sync-upstream"
          git checkout -B "$BRANCH"
          if ! git merge upstream/main --no-edit; then
            git merge --abort
            echo "Upstream merge requires manual conflict resolution."
            exit 1
          fi

          # Retain the fork's reviewed, SHA-pinned workflows. The repository
          # token intentionally has no authority to replace workflow files.
          git restore --source=origin/main --staged --worktree -- .github/workflows
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push --force-with-lease origin "$BRANCH"
          {
            echo "## Upstream sync branch prepared"
            echo
            echo "Updated \`$BRANCH\` with ${{ steps.check.outputs.behind }} upstream commits."
            echo "Open a reviewed pull request from that branch; ElevenID workflow files were retained intentionally."
          } >> "$GITHUB_STEP_SUMMARY"
