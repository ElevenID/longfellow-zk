name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Add upstream remote
        run: git remote add upstream https://github.com/google/longfellow-zk.git || true
      
      - name: Fetch upstream
        run: git fetch upstream
      
      - name: Check for changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
      
      - name: Create sync PR
        if: steps.check.outputs.behind > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-upstream-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git merge upstream/main --no-edit || git merge --abort
          git push origin $BRANCH
          gh pr create --title "Sync with upstream google/longfellow-zk" \
            --body "Automated sync from upstream. ${{ steps.check.outputs.behind }} commits behind." \
            --base main --head $BRANCH
